name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-pipeline: # Змінив назву, бо тепер тут не тільки інтеграційні тести
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Якщо 3.8 впаде, 3.9 продовжить перевірку
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Start LocalStack with Docker Compose
        run: docker-compose up -d

      - name: Wait for LocalStack to be ready
        run: |
            echo "Waiting for LocalStack startup..."
            timeout 60 bash -c 'until curl -s http://localhost:4566/_localstack/health; do echo "Waiting..."; sleep 2; done'
            echo "LocalStack is ready!"

      - name: Print LocalStack logs on failure
        if: failure()
        run: docker logs integration_aws_test

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pylint
        run: | 
          pylint --fail-under 7 app
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"

      # --- Додані кроки з минулих робіт ---
      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest -v

      - name: Run BDD tests
        env:
          PYTHONPATH: .
        run: behave
      # ------------------------------------

      - name: Run integration tests
        env:
          PYTHONPATH: .
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          coverage run -m pytest --maxfail=1 --disable-warnings -v
          coverage report -m

      - name: Teardown Docker
        if: always()
        run: docker-compose down